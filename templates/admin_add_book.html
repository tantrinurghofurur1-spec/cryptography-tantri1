{% extends "base.html" %}
{% block title %}Add New Book{% endblock %}

{% block content %}
<div class="breadcrumb">
  <a href="{{ url_for('admin_dashboard') }}" class="link">← Back to Dashboard</a>
</div>

<div class="form-page">
  <div class="form-card">
    <div class="form-card__header">
      <span class="form-card__icon">📚</span>
      <h1 class="form-card__title">Add New Book</h1>
      <p class="form-card__subtitle">Fill in the details to add a book to the catalog</p>
    </div>

    <form method="post" action="{{ url_for('admin_add_book') }}" class="auth-form">
      <div class="form-row">
        <div class="form-group">
          <label for="title" class="form-label">Title <span class="required">*</span></label>
          <input
            type="text"
            id="title"
            name="title"
            class="form-input"
            placeholder="Book title"
            required
            autofocus
          />
        </div>

        <div class="form-group">
          <label for="author" class="form-label">Author <span class="required">*</span></label>
          <input
            type="text"
            id="author"
            name="author"
            class="form-input"
            placeholder="Author name"
            required
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="isbn" class="form-label">ISBN</label>
          <input
            type="text"
            id="isbn"
            name="isbn"
            class="form-input"
            placeholder="e.g. 9780743273565"
          />
        </div>

        <div class="form-group">
          <label for="year" class="form-label">Publication Year</label>
          <input
            type="number"
            id="year"
            name="year"
            class="form-input"
            placeholder="e.g. 2024"
            min="1000"
            max="2099"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="description" class="form-label">Description</label>
        <textarea
          id="description"
          name="description"
          class="form-input form-textarea"
          placeholder="A short description of the book…"
          rows="4"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="quantity" class="form-label">Number of Copies <span class="required">*</span></label>
        <input
          type="number"
          id="quantity"
          name="quantity"
          class="form-input form-input--short"
          value="1"
          min="1"
          required
        />
      </div>

      <div class="form-actions">
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn--ghost">Cancel</a>
        <button type="submit" class="btn btn--primary">Add to Catalog</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
