{% extends "base.html" %}
{% block title %}Log In{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-card__header">
      <span class="auth-card__icon">🔑</span>
      <h1 class="auth-card__title">Welcome back</h1>
      <p class="auth-card__subtitle">Log in to your LibraFlow account</p>
    </div>

    <form method="post" action="{{ url_for('login') }}" class="auth-form">
      <div class="form-group">
        <label for="identifier" class="form-label">Username or Email</label>
        <input
          type="text"
          id="identifier"
          name="identifier"
          class="form-input"
          placeholder="Enter your username or email"
          required
          autofocus
        />
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input"
          placeholder="Enter your password"
          required
        />
      </div>

      <div class="form-group form-group--inline">
        <label class="checkbox-label">
          <input type="checkbox" name="remember" value="1" class="checkbox-input" />
          <span>Remember me</span>
        </label>
      </div>

      <button type="submit" class="btn btn--primary btn--full">Log In</button>
    </form>

    <p class="auth-card__footer">
      Don't have an account?
      <a href="{{ url_for('register') }}" class="link">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
